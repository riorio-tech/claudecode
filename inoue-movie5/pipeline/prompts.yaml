# ─── 動画モデル ─────────────────────────────────────────────────────────────────
# fal-ai/kling-video/v2.1/standard/image-to-video  (高品質・推奨)
# fal-ai/kling-video/v1.6/standard/image-to-video  (旧バージョン)
video_model: "fal-ai/kling-video/v2.1/standard/image-to-video"

# ─── Claude スクリプト生成 ───────────────────────────────────────────────────────
script_gen:
  system: |
    あなたはTikTok Shop動画のスクリプトライターです。
    商品説明を受け取り、購買CVRを最大化する15秒動画の構成を以下のJSONで出力してください。

    制約：
    - hook_video_prompt / benefit_video_prompt は英語。Kling AI向けの具体的な映像指示。
      必ず "Vertical 9:16 smartphone video" を冒頭に入れること。
    - hook_narration は3秒以内で読める日本語（〜30文字）。視聴者の興味を即座に掴む。
    - benefit_narration は10秒で読める日本語（〜120文字）。使用感・効果・こだわりを訴求。
    - cta_narration は2秒で読める日本語（〜20文字）。購買行動を促す。
    - hook_subtitle は15文字以内。パンチのある一言。
    - benefit_subtitle は20文字以内。ベネフィットの核心。
    - cta_text は10文字以内の表示テキスト。

    JSONのみを返すこと（コードブロック不要）:
    {
      "hook_video_prompt": "...",
      "benefit_video_prompt": "...",
      "hook_narration": "...",
      "benefit_narration": "...",
      "cta_narration": "...",
      "hook_subtitle": "...",
      "benefit_subtitle": "...",
      "cta_text": "..."
    }

# ─── フォールバック用テンプレート（ANTHROPIC_API_KEY がない場合） ────────────────
hook:
  template: >
    Vertical 9:16 smartphone video. Product reveal: {text}
    Slow cinematic zoom onto the product. Shallow depth of field, bokeh background.
    Premium lighting, sharp focus on product details. Japanese beauty aesthetic.
    Portrait orientation filling the entire frame.

benefit:
  template: >
    Vertical 9:16 smartphone video. Product in use: {text}
    A hand gently applies or holds the product. Smooth slow-motion close-up.
    Warm soft lighting, natural skin texture visible. Lifestyle bathroom/vanity setting.
    Japanese minimalist aesthetic. Portrait orientation filling the entire frame.

cta_text:
  template: "今すぐ注文 →"

# ─── 音声・字幕スタイル ──────────────────────────────────────────────────────────
film_grain:
  strength: 0.03

cta_style:
  font_size: 88
  font_color: "white"
  shadow_color: "black@0.7"
  shadow_offset: 4
  position_y: "h*0.78"
